<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment-5||GitHub Issues Tracker</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="./styles/style.css">
</head>
<body>

    <div class="hero bg-base-200 min-h-screen">
        <div class="hero-content">

            <div class="card bg-base-100 w-96 shadow-xl">
                <div class="card-body">

                    <div class="text-center">
                        <div><img class="mx-auto" src="./assets/github-logo.png" alt=""></div>
                        <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
                        <p class="font-semibold">Sign in to manage your issues</p>
                    </div>

                    <label class="font-bold">Username</label>
                    <input id="username" type="text" class="input input-bordered" placeholder="Enter Username">

                    <label class="font-bold">Password</label>
                    <input id="password" type="password" class="input input-bordered" placeholder="Enter Password">

                    <button id="loginBtn" class="btn btn-primary mt-4">Sign In</button>
                    <h2 class="mx-auto">OR</h2>
                    <p class="text-center text-gray-500 mt-4">
                        Demo Credentials:
                    <div class="py-4 bg-sky-100 rounded-xl ">
                        <p class="text-center font-bold text-black mt-4">
                            Username: admin
                        </p>
                        <p class="text-center font-bold text-black text-black mt-4">
                            UserPassword: admin123
                        </p>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <script src="./scripts/login.js"></script>

</body>

</html>
