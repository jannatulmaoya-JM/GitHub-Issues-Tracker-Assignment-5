<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Issues Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="bg-base-200">

    <!-- Navbar -->
    <div class="navbar bg-white shadow-md px-6 w-full">

        <!-- Left -->
        <div class="flex-1">
            <div class="flex items-center gap-3">
                <img src="./assets/github-logo.png" class="w-10 h-10" alt="">
                <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
            </div>
        </div>

        <!-- Right -->
        <div class="flex items-center gap-3">
            <input id="searchInput" class="input input-bordered w-48 md:w-64" placeholder="Search Issues">
            <button class="btn btn-primary">+ New Issue</button>
        </div>

    </div>


    <!-- Main Content -->
    <div class="max-w-7xl mx-auto p-10 ">
          <!-- First Navbar -->
        <div class="navbar bg-base-100 shadow-sm rounded-lg gap-3 mb-6 p-5">
            <button class="btn btn-outline border-gray-400 text-black w-20 h-7">All</button>
            <button class="btn btn-outline border-gray-400 text-black w-20 h-7">Open</button>
            <button class="btn btn-outline border-gray-400 text-black w-20 h-7">Closed</button>
        </div>
        <!-- Second Navbar -->
        <div class="navbar bg-base-100 rounded-lg shadow-sm p-3  ">
            <div class="flex-1">
                <div class="flex items-center gap-3">
                    <div class="bg-gray-300 p-2 rounded-full ">
                        <img src="./assets/Aperture.png" class="w-6 h-6" alt="">
                    </div>
                    <div>
                        <h2 class="text-xl font-bold">50 Issues</h2>
                        <p>Track and manage your project issues</p>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-4">

                <p><i class="fa-solid fa-circle text-[#00A96E]"></i> Open</p>
                <p><i class="fa-solid fa-circle  text-[#A855F7]"></i>Closed</p>
            </div>
        </div>
     
       <div class="max-w-6xl mx-auto p-4" > 
        <div id="issuesContainer" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6 mt-6"></div>
    </div>

    </div>

    <script src="./scripts/issues.js"></script>

</body>

</html>
